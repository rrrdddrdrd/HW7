networks:
  cinema-net:
    driver: bridge

volumes:
  clickhouse-data:
  postgres-data:
  grafana-data:
  minio-data:
  prometheus-data:

x-kafka-common: &kafka-common
  image: confluentinc/cp-kafka:7.6.0
  networks:
    - cinema-net
  restart: unless-stopped
  depends_on:
    zookeeper:
      condition: service_healthy

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    networks:
      - cinema-net
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  kafka1:
    <<: *kafka-common
    container_name: kafka1
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka1:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 2
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka2:
    <<: *kafka-common
    container_name: kafka2
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka2:29092,EXTERNAL://localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 2
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
    ports:
      - "9093:9093"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9093"]
      interval: 15s
      timeout: 10s
      retries: 10

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: schema-registry
    networks:
      - cinema-net
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka1:29092,kafka2:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: 2
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  init-kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: init-kafka
    networks:
      - cinema-net
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    volumes:
      - ./schemas:/schemas
      - ./scripts:/scripts
    entrypoint: ["/bin/bash", "/scripts/init-kafka.sh"]
    restart: "no"

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: clickhouse
    networks:
      - cinema-net
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse/init:/docker-entrypoint-initdb.d
      - ./clickhouse/config/prometheus.xml:/etc/clickhouse-server/config.d/prometheus.xml
    ports:
      - "8123:8123"
      - "9000:9000"
      - "9363:9363"
    environment:
      CLICKHOUSE_DB: cinema
      CLICKHOUSE_USER: cinema_user
      CLICKHOUSE_PASSWORD: cinema_pass
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 15
    restart: unless-stopped
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      schema-registry:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    networks:
      - cinema-net
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: cinema_aggregates
      POSTGRES_USER: cinema_user
      POSTGRES_PASSWORD: cinema_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinema_user -d cinema_aggregates"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: minio
    networks:
      - cinema-net
    volumes:
      - minio-data:/data
    ports:
      - "9090:9000"
      - "9091:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  init-minio:
    image: minio/mc:latest
    container_name: init-minio
    networks:
      - cinema-net
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/movie-analytics &&
        echo 'Bucket ready'
      "
    restart: "no"

  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: producer
    networks:
      - cinema-net
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka1:29092,kafka2:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      KAFKA_TOPIC: movie-events
      KAFKA_ACKS: all
      GENERATOR_ENABLED: "true"
      GENERATOR_INTERVAL_MS: 500
      LOG_LEVEL: INFO
    depends_on:
      init-kafka:
        condition: service_completed_successfully
      schema-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  aggregation:
    build:
      context: ./aggregation
      dockerfile: Dockerfile
    container_name: aggregation
    networks:
      - cinema-net
    ports:
      - "8001:8001"
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_DB: cinema
      CLICKHOUSE_USER: cinema_user
      CLICKHOUSE_PASSWORD: cinema_pass
      POSTGRES_DSN: postgresql://cinema_user:cinema_pass@postgres:5432/cinema_aggregates
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: movie-analytics
      AGGREGATION_SCHEDULE: "0 * * * *"
      LOG_LEVEL: INFO
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      init-minio:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    networks:
      - cinema-net
    ports:
      - "9095:9090"
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-lifecycle
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    networks:
      - cinema-net
    ports:
      - "9094:9093"
    volumes:
      - ./alertmanager:/etc/alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka-exporter
    networks:
      - cinema-net
    ports:
      - "9308:9308"
    command:
      - --kafka.server=kafka1:29092
      - --kafka.server=kafka2:29092
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter
    networks:
      - cinema-net
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://cinema_user:cinema_pass@postgres:5432/cinema_aggregates?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    networks:
      - cinema-net
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      clickhouse:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  tests:
    build:
      context: ./tests
      dockerfile: Dockerfile
    container_name: cinema-tests
    networks:
      - cinema-net
    environment:
      PRODUCER_URL: http://producer:8000
      AGGREGATION_URL: http://aggregation:8001
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_DB: cinema
      CLICKHOUSE_USER: cinema_user
      CLICKHOUSE_PASSWORD: cinema_pass
      POSTGRES_DSN: postgresql://cinema_user:cinema_pass@postgres:5432/cinema_aggregates
    depends_on:
      producer:
        condition: service_healthy
      aggregation:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
    profiles:
      - test
    restart: "no"

  k6:
    image: grafana/k6:latest
    container_name: k6
    networks:
      - cinema-net
    volumes:
      - ./load-tests:/scripts
    environment:
      PRODUCER_URL: http://producer:8000
    command: run --out json=/scripts/results/result.json /scripts/load_test.js
    depends_on:
      producer:
        condition: service_healthy
    profiles:
      - load-test
    restart: "no"
