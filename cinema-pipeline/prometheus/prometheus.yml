global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: producer
    static_configs:
      - targets: [producer:8000]
    metrics_path: /metrics

  - job_name: aggregation
    static_configs:
      - targets: [aggregation:8001]
    metrics_path: /metrics

  - job_name: kafka
    static_configs:
      - targets: [kafka-exporter:9308]

  - job_name: postgres
    static_configs:
      - targets: [postgres-exporter:9187]

  - job_name: clickhouse
    static_configs:
      - targets: [clickhouse:9363]
