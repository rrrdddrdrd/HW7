global:
  resolve_timeout: 5m

route:
  group_by: [alertname, job, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: log-receiver

receivers:
  - name: log-receiver

inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: [alertname, job]
